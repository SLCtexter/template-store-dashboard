<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processing PayPal Payment...</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f8f9fa;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            padding: 40px;
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .success { color: #10b981; }
        .error { color: #ef4444; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Processing PayPal Payment...</h2>
        <div class="spinner"></div>
        <p id="message">Please wait while we verify your payment...</p>
    </div>

    <script>
        (async function() {
            try {
                // Get query parameters from the URL
                const urlParams = new URLSearchParams(window.location.search);
                const token = urlParams.get('token');          // PayPal order ID
                const payerId = urlParams.get('PayerID');     // PayPal payer ID

                if (!token) {
                    throw new Error('PayPal order token not found');
                }

                const localOrderId = sessionStorage.getItem('pendingPayPalOrderId');
                if (!localOrderId) {
                    throw new Error('Order ID not found. Please try again.');
                }
                const response = await fetch('/.netlify/functions/capture-paypal-order', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        orderID: token, 
                        orderId: localOrderId,
                        payerId: payerId 
                    })
                });

                const data = await response.json();
                if (data.success) {
                    document.getElementById('message').innerHTML = '<span class="success">Payment successful! Thank you.</span>';
                    setTimeout(() => {
                        window.location.href = '/thankyou.html';
                    }, 1500);
                } else {
                    throw new Error(data.error || 'Payment capture failed');
                }
            } catch (err) {
                console.error('Capture error:', err);
                document.getElementById('message').innerHTML = `<span class="error">An error occurred: ${err.message}. Please try again.</span>`;
                setTimeout(() => {
                    window.location.href = '/checkout';
                }, 3000);
            } finally {
                // Clean up session storage
                sessionStorage.removeItem('pendingPayPalOrderId');
            }
        })();
    </script>
</body>
</html>
